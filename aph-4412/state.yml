meta:
  jira: APH-4412
  title: "Investigate anyo-api 503s when GKE CPU requested usage reaches parity with actual usage"
  created: "2026-03-18"
  status: active
  owners:
    - pragadeesh
  repos_and_paths:
    anyobackendapi:
      - infra/gcp/k8s/base/api/
      - infra/gcp/terraform/stacks/gclb/
      - infra/gcp/terraform/stacks/monitoring/

state_yml_hygiene:
  purpose: >
    Single source of truth. Keep accurate, minimal, actionable.
  rules:
    - "After meaningful changes, update progress.last_update and progress.last_agent."
    - "Never store secrets/tokens/private keys."
    - "Never store PII. Use placeholders."
    - "If blocked: set task status=blocked, add to progress.blocking_questions."
    - "When completed: add brief evidence to progress.evidence."

constraints:
  scope:
    - "Investigate intermittent anyo-api 503s in prod on GKE Autopilot."
    - "Correlate Sentry-identified instances with load balancer, backend health, HPA, and pod-level signals."
    - "Use deploy-runner VM as the path to access cluster diagnostics."
    - "Restore and correct prod monitoring dashboards needed for event-day capacity planning."
    - "Prepare a safe event-day HPA floor recommendation and corresponding repo config change."
  safety:
    - "Avoid direct pod/workload restarts or destructive GCP actions."
    - "Limit prod mutations to approved monitoring/dashboard Terraform reconciliation and config-only capacity updates."
    - "Do not retrieve or store secrets, tokens, or PII."

decisions:
  cluster:
    choice: "anyo-gke-autopilot-as1"
  namespace:
    choice: "anyo-backend"
  workload:
    choice: "anyo-api"
  debugging_path:
    choice: "Access cluster diagnostics via deploy-runner VM only."
  monitoring_path:
    choice: "Use Terraform-managed Cloud Monitoring dashboard plus Metrics Explorer data for event sizing."
  likely_hypotheses:
    - "HPA threshold and CPU request mismatch delays scale-out until pods are already saturated."
    - "Backend health/readiness flaps cause GCLB to temporarily see no healthy endpoints and emit 503s."
    - "Another infrastructure bottleneck exists in load balancer, NEG health, or pod lifecycle."
  event_day_capacity_strategy:
    choice: "Increase HPA minReplicas for the event first; do not change HPA metric semantics on the same day unless explicitly approved."
    rationale:
      - "Current HPA behavior is understood well enough to add warm capacity safely, but not well enough to change scaling semantics on the day of the event."
      - "The live HPA still scales on CPU `AverageValue: 525m`, while the pod spec requests 300m CPU and live Autopilot-adjusted requests were observed at 385m; switching to utilization-based scaling would materially change the scale-out trigger rather than just adding baseline capacity."
      - "For a same-day event, raising `minReplicas` is additive, predictable, and reversible. Changing from `AverageValue` to `AverageUtilization` changes both scale-up and steady-state behavior and can introduce unexpected oscillation or under/over-scaling if the target is not calibrated."
      - "Dashboard evidence so far shows CPU request utilization spikes below hard saturation and memory remains comfortably below pressure, so the urgent reliability need is more warm pods at the start of the event, not a policy redesign under time pressure."
      - "The monitoring/dashboard work only just reached a usable state today; we do not yet have enough validated historical HPA replica evidence to choose a utilization target with confidence."
      - "Safer sequence: use a conservative floor for the event, observe real traffic and HPA behavior, then retune HPA semantics afterward using the new dashboard data."
  hpa_retune_strategy:
    choice: "Keep CPU `AverageValue` semantics; do not return API HPA to utilization-based scaling unless a new explicit decision record supersedes DRI-016 with production validation evidence."
    rationale:
      - "DRI-016 and migration-state both record that API autoscaling was moved to `AverageValue` specifically to keep scaling intent independent of future CPU request changes."
      - "With request `300m`, `averageUtilization: 60` would scale at `180m`, reintroducing request-coupled behavior."
      - "Any later CPU request change would silently retune production autoscaling behavior even if traffic were unchanged."
      - "A future return to utilization-based scaling now requires a superseding explicit decision record and production validation rather than an implicit post-event config change."
  startup_probe_strategy:
    choice: "Keep the current startupProbe for the event; post-event rollout should change `initialDelaySeconds` from `60` to `30` while keeping `periodSeconds: 10`, `timeoutSeconds: 5`, and `failureThreshold: 30`."
    rationale:
      - "Historical `startup_complete` data for express (`n=500`, last 14 days) shows p50 `40.6s`, p90 `49.0s`, p95 `53.4s`, p99 `62.0s`, and max `83.4s`."
      - "The current startup probe does not begin until `60s`, so most pods are already listening before the first check."
      - "The current startup budget is already roughly `360s` (`60s` initial delay + `30` failures * `10s` period), which is far above observed startup times; increasing `failureThreshold` is unnecessary."
      - "Reducing `initialDelaySeconds` to `30` should improve average readiness time for scaled pods while preserving a large retry budget for slow starts."

execution:
  git_layout: "multi-repo (each folder is its own git repo; workspace root is not a git repo)"
  development_guidelines:
    testing_policy:
      tdd: false
      note: "Do NOT follow TDD. Add/modify tests only when explicitly requested."
    verification_policy:
      note: "Prefer manual verification with targeted lint/typecheck only when stable."
  branch_plan:
    anyobackendapi:
      base: "origin/main"
      branch: "aph-4412"
      pr: "PR-Backend (only if config changes are later approved)"

