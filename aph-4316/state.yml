meta:
  jira: APH-4316
  title: "AnyoScrumMasterAgent: make production-usable (memory + prompt + standup/wind-down automation)"
  created: "2026-03-09"
  status: active
  owners:
    - pragadeesh
  repos_and_paths:
    anyobackendapi: ../anyobackendapi

state_yml_hygiene:
  purpose: >
    Single source of truth. Keep accurate, minimal, actionable.
  rules:
    - "After meaningful changes, update progress.last_update and progress.last_agent."
    - "Never store secrets/tokens/private keys."
    - "Never store PII. Use placeholders."
    - "If blocked: set task status=blocked, add to progress.blocking_questions."
    - "When completed: add brief evidence to progress.evidence."

constraints:
  defaults:
    timezone: "Asia/Kolkata"
    standup_time_ist: "11:00"
    wind_down_time_ist: "18:00"
  scope:
    - "Productize the existing POC rather than replacing it with an external memory service."
    - "Retain recurring jobs, on-demand jobs, task manager, and Discord/Jira integrations."
    - "Do not add tests unless explicitly requested; prefer manual verification and targeted checks when stable."

decisions:
  product_direction:
    choice: "Turn the existing POC into a usable internal scrum bot rather than replacing the memory stack."
  rollout_scope:
    choice: "Full automation v1 including chat, reminders, daily standup, daily wind-down, and deterministic follow-up flows."
  automation_defaults:
    choice: "Use existing cron defaults of 11:00 IST for standup and 18:00 IST for wind-down."
  memory_strategy:
    choice: "Keep existing memory pipeline, fix ingestion/runtime recall, and add bounded deterministic working memory/context assembly."

execution:
  git_layout: "multi-repo (each folder is its own git repo; workspace root is not a git repo)"
  development_guidelines:
    testing_policy:
      tdd: false
      note: "Do NOT follow TDD. Add/modify tests only when explicitly requested."
    verification_policy:
      note: "Prefer manual verification with targeted lint/typecheck only when stable."
  branch_plan:
    anyobackendapi: "Create/use branch aph-4316-anyoscrum from origin/main"

tasks:
  - id: T1
    title: "Root-cause the current unusable behavior"
    status: completed
    notes:
      - "Confirm why long-term memory is not being created/used for most users."
      - "Verify env gating for Discord bot handling, PubSub worker execution, and agenda scheduling."
      - "Document evidence from code paths and DB counts before changing behavior."
  - id: T2
    title: "Make automation flows execute end-to-end"
    status: completed
    notes:
      - "Enable ScrumMasterMorningStandupJob and ScrumMasterEveningWindDownJob registrations."
      - "Verify on-demand task execution path sends DMs and updates task status deterministically."
      - "Ensure reminders/follow-ups/escalations are auditable via tasks/logs."
  - id: T3
    title: "Rework scrum bot memory/runtime context assembly"
    status: completed
    notes:
      - "Stop relying only on recent message replay."
      - "Introduce bounded working memory for decisions, owners, blockers, deadlines, and active tickets."
      - "Use existing Universal Memory / agent logs as bounded retrieval inputs with safe limits."
  - id: T4
    title: "Rewrite system prompt and tool-use rubric"
    status: completed
    notes:
      - "Make Jira grounding mandatory for Jira facts/actions."
      - "Remove conflicting memory rules that block automatic compact recall."
      - "Keep the prompt concise, enforceable, and Discord-appropriate."
  - id: T5
    title: "Manually verify production-usable flows"
    status: pending
    notes:
      - "Decision/owner/blocker recall across days."
      - "Jira ticket question grounded in Jira tools."
      - "Standup and wind-down task execution including DM delivery and task completion/failure updates."

progress:
  last_update: "2026-03-12"
  last_agent: "Claude"
  carryforward:
    - "Verify on-demand task execution path marks tasks completed after DM/Jira actions in real automation runs."
    - "Exercise activeWorkflow + pendingInteraction behavior in Discord with standup recap and evening-update follow-up flows."
    - "Create Atlas vector indexes in prod for anyoUniversalMemories and anyoScrumMasterAgentLogs before relying on semantic retrieval quality."
  evidence:
    - "Jira created: APH-4316"
    - "Current findings: scrum bot currently replies but forgets; long-term memory retrieval is not automatically used at runtime."
    - "Current findings: standup and wind-down cron job registrations are commented out in agendaJobService.ts."
    - "Current findings: anyoUniversalMemories has only a small number of scrum memories and only for one user, despite multiple users in message logs."
    - "First build batch: re-enabled scrum recurring jobs in agendaJobService.ts."
    - "First build batch: BaseAgent now injects bounded relevant memories + memory summary before recent message context."
    - "First build batch: AnyoScrumMasterAgent prompt now requires Jira grounding and no longer disables semantic/log recall by design."
    - "First build batch: AnyoUniversalMemoryService now passes conversation context + entity types to prompts and preserves extracted dates."
    - "Branch in active use: aph-4316-anyoscrum"
    - "Runtime routing check: ANYO_DEV_BOT response mismatch traced to server running checkout that still mapped to LyfisExcelCompilerAgent."
    - "Main checkout updated with APH-4316 code changes and TypeScript verification passed."
    - "Prod DB check: missing vector indexes memory_vector_index on anyoUniversalMemories and embedding_vector_index on anyoScrumMasterAgentLogs."
    - "Local MongoDB does not support Atlas $vectorSearch; added graceful fallback logging for SearchNotEnabled instead of noisy error output."
    - "ANYO_DEV_BOT crash traced to invalid one-argument z.record(...) tool schemas; fixed AgentLogService, JiraAgentTools, and AnyoMemoryAgentTools to use explicit string-keyed records."
    - "Reminder time display bug traced to getCurrentIsoDateTime returning a Date object that serialized in UTC; changed it to return explicit timezone-aware ISO/display strings for IST-safe responses."
    - "Reverted heuristic low-word memory gating; replaced with deterministic scrum reminder confirmation handling so bare 'yes' after the duplicate-reminder prompt schedules the reminder instead of drifting into unrelated memory recall."
    - "Memory summary path no longer performs retrieval with an empty query; it now pulls recent important memories directly for summary generation."
    - "Removed the hardcoded exact-phrase confirmation branch. Reminder handling now uses explicit pending interaction state stored in checkpoint context, plus deterministic reminder intent handling and conflict resolution (yes / no / replace)."
    - "BaseAgent now preserves existing checkpoint context when loading a new turn, so pending interaction state survives across replies instead of being overwritten every turn."
    - "Architecture correction: moved away from reminder-specific conversation interception. Added generic pending interaction tools (set/get/clear) in the default toolset and BaseAgent runtime handling so interaction state is separated from long-term memory retrieval."
    - "BaseAgent now suppresses long-term memory injection while a pending interaction exists, preventing confirmation/choice turns from drifting into unrelated semantic memory." 
    - "Task lifecycle fix: ScrumMasterAgentTaskJob now marks tasks in_progress before execution and auto-completes them after successful execution if the agent did not explicitly close them."
    - "Task hygiene fix: AnyoScrumMasterAgentTaskManager now marks stale overdue pending/in_progress tasks as failed before task queries, preventing ancient reminders from polluting current interaction decisions."
    - "Local DB cleanup performed for Pragadeesh user: 5 stale pending reminder tasks were marked failed so current conversations stop tripping over December/today-old reminders."
    - "Additional local cleanup: 1 remaining overdue pending reminder task for Pragadeesh was marked failed before live retest."
    - "Plan saved: anyobackendapi/docs/plans/2026-03-11-anyoscrum-workflow-first-redesign.md"
    - "Prompt assembly fix: BaseAgent now builds prompts with system/runtime context first, trims recent conversation to a bounded window, and stops double-injecting recent logs plus checkpoint history."
    - "Workflow-state fix: BaseAgent now supports runtime state directives and active workflow context; DefaultAgentTools now exposes set/get/clear tools for active workflow state in addition to pending interaction state."
    - "Scrum prompt redesign: AnyoScrumMasterAgent prompt now defines morning standup ingest, evening update ingest, blocker triage, prod push coordination, and sprint hygiene as core responsibilities."
    - "Workflow classification added: AnyoScrumWorkflowService auto-detects standup_ingest, evening_update_ingest, blocker_triage, prod_push_coordination, sprint_hygiene, and generic_scrum_qa from incoming turns."
    - "Morning and evening collection jobs now ask for concrete Anyo-style update structure (updates, blockers, dependencies, APH tickets, prod/QA/review status) instead of generic status prompts."
    - "ScrumMasterThinkAndActJob added: runs every 2 hours, creates a scrum_think_and_act automation task that wakes the agent with no incoming user message to proactively review sprint state and act only when something needs attention."
    - "JiraMcpTools rewritten: bypasses @langchain/mcp-adapters/MultiServerMCPClient entirely; makes direct HTTP calls to mcp.atlassian.com/v1/mcp with protocolVersion=2025-03-26 (Atlassian's max supported version, vs SDK 1.27.1 which sends 2025-11-25 causing -32601 errors); parses SSE-formatted JSON-RPC responses; converts MCP JSON Schema to Zod via recursive converter; creates DynamicStructuredTool per MCP tool."
    - "AnyoScrumMasterAgent now loads Jira MCP tools at startup via loadJiraMcpTools() and exposes them through getAdditionalTools(), replacing keyword-based workflow detection with Jira-grounded facts."
    - "agendaJobService.ts: ScrumMasterMorningStandupJob, ScrumMasterEveningWindDownJob, ScrumMasterThinkAndActJob, and ScrumMasterAgentTaskJob are all now registered and active."
    - "Bug fix: Jira MCP tools were only preloaded in ScrumMasterAgentTaskJob but not on the Discord message path; added AnyoScrumMasterAgent.preloadMcpTools() call in discordAlertService.ts before instantiating the agent for Discord turns."
    - "Memory hallucination fix: deleted contaminated anyoUniversalMemories (fake 'chicken noodles' personal preference) and cleared 84 LangGraph checkpoint docs for scrum thread to stop bot from replying with hallucinated personal data."
    - "BaseAgent memory gate: skip semantic long-term memory retrieval for trivial messages shorter than 4 words (e.g. 'Hi', 'yes', 'ok') to prevent unrelated entity matches surfacing in responses."
  blocking_questions: []
