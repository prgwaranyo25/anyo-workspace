meta:
  jira: APH-EPIC
  title: ""
  created: ""
  status: active
  owners: []
  repos_and_paths: {}

state_yml_hygiene:
  purpose: >
    Single source of truth for the epic. Keep accurate, minimal, and high level.
  rules:
    - "After meaningful changes, update progress.last_update and progress.last_agent."
    - "Never store secrets/tokens/private keys."
    - "Never store PII. Use placeholders."
    - "Keep detailed implementation tasks in child ticket state.yml files."
    - "Track shared blockers and cross-ticket decisions here."

constraints: {}

decisions: {}

execution:
  git_layout: "multi-repo (each folder is its own git repo; workspace root is not a git repo)"
  development_guidelines:
    testing_policy:
      tdd: false
      note: "Do NOT follow TDD. Add/modify tests only when explicitly requested."
    verification_policy:
      note: "Prefer manual verification with targeted lint/typecheck only when stable."
  branch_plan: {}

child_tickets: []

progress:
  last_update: ""
  last_agent: ""
  carryforward: []
  evidence: []
  blocking_questions: []
