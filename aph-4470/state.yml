meta:
  jira: APH-4470
  title: "Expert Onboarding Improvements: New Fields, Admin Approval Pipeline & Expert Portal UX"
  created: "2026-03-20"
  status: active
  owners: []
  repos_and_paths:
    anyoexpertportal: "../anyoexpertportal"
    anyobackendapi: "../anyobackendapi"
    anyo-portal: "../anyo-portal"

state_yml_hygiene:
  purpose: >
    Single source of truth. Keep accurate, minimal, actionable.
  rules:
    - "After meaningful changes, update progress.last_update and progress.last_agent."
    - "Never store secrets/tokens/private keys."
    - "Never store PII. Use placeholders."
    - "If blocked: set task status=blocked, add to progress.blocking_questions."
    - "When completed: add brief evidence to progress.evidence."

constraints:
  no_tdd: true
  verification: "manual verification + agent-browser MCP for UI testing"
  no_worktree: true
  code_quality: "high — no shortcuts"

decisions:
  approach: >
    Phase 1: deconstruct and document the current onboarding flow across all three repos.
    Phase 2: scope sub-tickets per milestone.
    Phase 3: implement per scoped tickets.
  testing_approach: >
    Start server + expert portal locally and use agent-browser MCP for UI verification.

execution:
  git_layout: "multi-repo (each folder is its own git repo; workspace root is not a git repo)"
  development_guidelines:
    testing_policy:
      tdd: false
      note: "Do NOT follow TDD. Add/modify tests only when explicitly requested."
    verification_policy:
      note: "Manual verification via agent-browser MCP. Start server and expert portal to verify UI."
  branch_plan:
    anyoexpertportal: "aph-4470"
    anyobackendapi: "aph-4470"
    anyo-portal: "aph-4470"

