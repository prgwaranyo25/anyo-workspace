  - id: B2
    title: "Update scenario selection template to exclude fallback candidates when specific scenarios match"
    repo: anyobackendapi
    status: completed
    files:
      - "src/core/service/agents/LyfisExcelCompilerAgent.ts"
  - id: B3
    title: "Preserve trace and no-labs override behavior while adding fallback exclusion guidance"
    repo: anyobackendapi
    status: completed
    files:
      - "src/core/service/agents/LyfisExcelCompilerAgent.ts"
  - id: V1
