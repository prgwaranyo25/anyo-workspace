          avg_ms: 1809
          count: 308
          note: "Google Calendar event creation. Present in ~80% of calls. Synchronous on critical path."
        - op: "db"
          desc: "GET USER_CACHE"
          avg_ms: 723
          count: 15
          note: "Cache miss / slow Redis read. Infrequent but ~700ms when it hits."
        - op: "http.client"
          desc: "POST https://server.gallabox.com/devapi/messages/whatsapp"
          avg_ms: 637
          count: 601
          note: "WhatsApp notification via Gallabox. 601 spans for 386 requests → multiple per call."
        - op: "http.client"
          desc: "POST https://discord.com/api/v10/channels/1155905216076578876/messages"
          avg_ms: 586
