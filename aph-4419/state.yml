meta:
  jira: APH-4419
  title: "Investigate latency for POST /app/bookAppointment and prepare a production-safe fix plan"
  created: "2026-03-18"
  status: completed
  owners:
    - pragadeesh.waran@anyo.app
  repos_and_paths:
    anyobackendapi: "investigation only — no code changes"

state_yml_hygiene:
  purpose: >
    Single source of truth. Keep accurate, minimal, actionable.
  rules:
    - "After meaningful changes, update progress.last_update and progress.last_agent."
    - "Never store secrets/tokens/private keys."
    - "Never store PII. Use placeholders."
    - "If blocked: set task status=blocked, add to progress.blocking_questions."
    - "When completed: add brief evidence to progress.evidence."

constraints:
  no_code_changes: "This ticket is investigation only. No code changes to anyobackendapi."
  scope: "anyobackendapi only — route POST /app/bookAppointment"

decisions:
  fix_approach: "Option A — keep Google Calendar sync (meet link in first WhatsApp), move all notifications async"
  fix1_scope: "Cache google.calendar client per email at module level in googleMeetService.ts — SDK manages OAuth token refresh internally"
  fix2_scope: "Publish to SESSION_NOTIFICATION_Q after meet link is saved instead of awaiting processSessionBooking inline"
  sts_root_cause: "STS spikes are from CredentialManager CSFLE/KMS credential rotation — unrelated to Calendar. Lower priority."
  getawssecret_note: "getAWSSecret is already cached. A TTL-based cache handler is a separate follow-up recommendation."

execution:
  git_layout: "multi-repo (each folder is its own git repo; workspace root is not a git repo)"
  development_guidelines:
    testing_policy:
      tdd: false
      note: "Do NOT follow TDD. Add/modify tests only when explicitly requested."
    verification_policy:
      note: "Prefer manual verification with targeted lint/typecheck only when stable."
  branch_plan:
    anyobackendapi: "aph-4419 (investigation only, no commits expected)"

tasks:
  - id: T1
    title: "Collect Sentry evidence — count, avg, p95, p99, slow traces, dominant spans"
    status: completed
  - id: T2
    title: "Inspect route → handler → service → DB/cache/external deps in anyobackendapi"
    status: completed
  - id: T3
    title: "Rank root-cause hypotheses"
    status: completed
  - id: T4
    title: "Propose production-safe fix options"
    status: completed

progress:
  last_update: "2026-03-18"
  last_agent: "claude-sonnet-4-6"
  carryforward:
    - "Open question before implementing Fix 2: does the WhatsApp confirmation message need the meet link inline, or can it be sent async after Calendar creation?"
  evidence:
    - task: T1
      summary: "Sentry data collected for POST /app/bookAppointment (last 30 days)"
