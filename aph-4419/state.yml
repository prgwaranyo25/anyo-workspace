          note: "Discord notification channel 2. In-band."
        - op: "http.client"
          desc: "POST https://identitytoolkit.googleapis.com/v1/projects/anyo-2022/accounts:lookup"
          avg_ms: 363
          count: 905
          note: "Firebase identity lookup. 905 spans for 386 requests → ~2.3x per request. Possibly redundant."
        - op: "http.client"
          desc: "POST https://fcm.googleapis.com/v1/projects/anyo-2022/messages:send"
          avg_ms: 295
          count: 867
          note: "FCM push notification. ~2.2x per request. In-band."
        - op: "http.client"
          desc: "POST https://app.posthog.com/batch/"
          avg_ms: 270
          count: 812
          note: "PostHog analytics. ~2.1x per request. In-band — should be fire-and-forget."
        - op: "http.client"
          desc: "POST https://www.googleapis.com/oauth2/v4/token"
          avg_ms: 250
          count: 308
          note: "OAuth token refresh for Google Calendar. Paired with Calendar API calls."
      slow_traces:
        - trace_id: "9b5734258dad405898614a6efb4ea106"
          duration_ms: 9524
          spans: 182
          db_spans: 154
          http_spans: 16
          top_http_span_ms: 2440
          errors: 0
          url: "https://anyo.sentry.io/explore/traces/trace/9b5734258dad405898614a6efb4ea106"
        - trace_id: "c568556cb643413b90f47497bf67f3c3"
          duration_ms: 27492
          spans: 222
          db_spans: 158
          http_spans: 16
          top_db_span_ms: 2836
          errors: 2
          note: "Outlier — 27s, 2 errors, large db span. Likely a retry/timeout scenario."
          url: "https://anyo.sentry.io/explore/traces/trace/c568556cb643413b90f47497bf67f3c3"
        - trace_id: "ca2dab927548417b9e9de5b9f632e8c8"
          duration_ms: 862
          spans: 54
          http_spans: 4
          errors: 0
          note: "Fast path — no Calendar/STS. Only 4 http.client spans."
          url: "https://anyo.sentry.io/explore/traces/trace/ca2dab927548417b9e9de5b9f632e8c8"
    - task: T2
      summary: "Full execution path mapped in PostSessionBookingWorker.ts + sessionService.ts + googleMeetService.ts"
      key_files:
        - "src/core/handlers/therapist-handler.ts:111 — bookAppointmentPostHandler"
        - "src/core/service/sessionService.ts:1192 — saveTherapistAppointment"
        - "src/jobServer/PostSessionBookingWorker.ts:65 — processSessionBooking"
        - "src/common/google-meet/googleMeetService.ts:25 — initGoogleMeetService"
      finding: >
        processSessionBooking is called synchronously inside saveTherapistAppointment,
        blocking res.send until all 15 steps complete. All notifications (Discord, WhatsApp x2,
        scheduleNotificationsForSession) are awaited in-band after the booking is already committed.
        initGoogleMeetService fetches AWS Secrets Manager on every call with no caching,
        creating a fresh GoogleAuth instance each time (no OAuth token reuse).
        getAnyoUserById is called in processSessionBooking even though auth middleware
        already resolved the user — but this is consistent with codebase convention
        (each function fetches its own data) so not treated as a bug.

    - task: T3
      hypotheses:
        - rank: 1
          cause: "Google Meet/Calendar creation synchronous with no credential caching"
          evidence: "initGoogleMeetService fetches AWS secret + new GoogleAuth on every call → OAuth token refresh every time → Calendar API call"
          avg_cost_ms: 2060
          frequency: "~80% of calls (308/386)"
        - rank: 2
          cause: "All post-booking notifications block the response"
          evidence: "Discord, WhatsApp x2, scheduleNotificationsForSession all awaited after booking committed to DB"
          avg_cost_ms: 1500
          frequency: "nearly every call"
        - rank: 3
          cause: "AWS STS spike on credential rotation"
          evidence: "getAWSSecret hits STS when temp creds expire — first request after rotation pays full penalty"
          avg_cost_ms: 4325
          frequency: "rare (~3%, 11/386)"
        - rank: 4
          cause: "getAnyoUserById duplicate fetch"
          evidence: "Firebase accounts:lookup 905x for 386 requests (~2.3x). Auth middleware + explicit call in processSessionBooking."
          avg_cost_ms: 363
          frequency: "every call — but consistent with codebase convention, not treated as a bug"

    - task: T4
      fix_plan:
        - priority: 1
          fix: "Cache GMAIL_CREDS and GoogleAuth instance at module level in googleMeetService.ts"
          addresses: ["#1 credential caching", "#3 STS spike"]
          risk: very_low
          expected_gain: "~250ms saved every call + STS spikes limited to cold start only"
        - priority: 2
          fix: "Move processSessionBooking off the request path — publish to SESSION_NOTIFICATION_Q (already exists) instead of awaiting directly"
          addresses: ["#2 synchronous notifications"]
          risk: low_medium
          open_question: "Decide whether meet link must be in WhatsApp message (keep Calendar sync) or can be sent async (move Calendar off path too)"
          expected_gain: "~1500-2000ms off response time"
        - priority: 3
          fix: "Reassess duplicate Firebase lookup after fixes 1+2 ship and metrics settle"
          addresses: ["#4"]
          risk: low
          note: "Moot if notifications move async. Revisit post-deploy."
      recommended_next_ticket: "Create implementation ticket for Fix 1 (credential caching) as standalone safe change"

  blocking_questions: []
