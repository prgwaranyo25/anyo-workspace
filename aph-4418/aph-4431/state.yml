state_yml_hygiene:
  purpose: >
    Single source of truth. Keep accurate, minimal, actionable.
  rules:
    - "After meaningful changes, update progress.last_update and progress.last_agent."
    - "Never store secrets/tokens/private keys."
    - "Never store PII. Use placeholders."
    - "If blocked: set task status=blocked, add to progress.blocking_questions."
    - "When completed: add brief evidence to progress.evidence."

constraints:
  scope:
    - "This child ticket records cache-specific observations only; no backend code changes are in scope yet."
    - "Keep shared cross-route cache findings aligned with APH-4418 while storing ticket-local cache notes here."
    - "No secrets or production credentials may be stored in notes or state."
  investigation_policy:
    - "Separate steady-state cache latency skew from transient cache connection-reset events."
    - "Do not infer cache saturation from latency alone; prefer Sentry plus read-only GCP evidence."

decisions:
  parent_epic:
    jira: APH-4418
    title: "API latency reduction - app API inventory and prioritization"
    note: "Tracked under the epic as a cache-observations child ticket."
  current_position:
    choice: "Observed partner-cache slowness is primarily request-shape dependent rather than explained by Valkey saturation."
    evidence:
      - "The same PARTNER_CACHE key is fast in GET /getUserByEmail but much slower in grid/list routes."
      - "Sentry shows repeated same-key partner-cache reads within single slow traces."
      - "GCP logs show transient SocketClosedUnexpectedlyError events during a Valkey pod replacement window."

execution:
  git_layout: "multi-repo (each folder is its own git repo; workspace root is not a git repo)"
  development_guidelines:
    testing_policy:
      tdd: false
      note: "Do NOT follow TDD. Add/modify tests only when explicitly requested."
    verification_policy:
      note: "Prefer manual verification with targeted lint/typecheck only when stable."
  branch_plan:
    anyobackendapi:
      base: "origin/main"
      branch: "aph-4431"
      pr: "TBD"

tasks:
