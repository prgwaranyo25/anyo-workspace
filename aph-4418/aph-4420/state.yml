progress:
  last_update: "2026-03-18"
  last_agent: "Claude"
  carryforward:
    - "APH-4419 proposed: (1) cache Google Calendar client, (2) move notifications async. User not satisfied — deeper investigation required."
  evidence:
    - "Jira ticket APH-4420 exists: Fix POST /app/bookAppointment latency — cache Calendar client + move notifications async."
    - "Scaffolded aph-4418/aph-4420/ from _template."
    - "7d Sentry (fresh): count=161, avg=6,425ms, p95=10,588ms, p99=26,627ms."
    - "24h Sentry (fresh): count=40, avg=6,698ms, p95=16,180ms, p99=27,492ms — currently worse than 7d, not better."
    - "5 slow traces inspected span-by-span (27,492ms / 25,365ms / 13,291ms / 11,506ms / 10,906ms)."
    - "Root cause confirmed: saveTherapistAppointment (sessionService.ts:1384) calls await processSessionBooking() synchronously — entire post-booking chain blocks response."
    - "New finding: Discord sends 3 sequential awaited HTTP calls at the START of processSessionBooking (before Calendar). Dominates tail: up to 16,076ms in one trace."
    - "New finding: AWS STS us-east-1 credential refresh (~4,500ms) observed in 2/5 traces. Not in APH-4419 findings."
    - "Confirmed: initGoogleMeetService creates fresh GoogleAuth+calendar client every call; oauth2/v4/token fetched each time (~300ms). getAWSSecret has secretCache so GMAIL_CREDS is cached after first call."
    - "Confirmed: Google Calendar events.insert always 1,820-2,270ms, present in all 5 traces."
    - "Confirmed: Gallabox WhatsApp 2 calls and FCM 2-4 calls all sequential awaited in-band."
    - "APH-4420 Jira fix plan is correct directionally but incomplete: it proposes keeping Calendar synchronous, but Calendar also takes 2,000ms and should be async; it does not address Discord sequential calls (dominant tail cause); it does not address STS spikes."
    - "Full diagnosis written to: aph-4418/aph-4420/notes/deep-trace-diagnosis.md"
  blocking_questions:
    - "How many Discord calls does sendTherapistAppointmentDiscordNotification make and to which channels? (Need sessionNotificationService.ts)"
    - "Is SESSION_NOTIFICATION_Q in-process (EventEmitter) or a real async queue? Determines whether FCM spans in the same trace are expected."
    - "What triggers the STS call — SecretsManagerClient credential provider or CredentialManager directly?"
