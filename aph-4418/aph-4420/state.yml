state_yml_hygiene:
  purpose: >
    Single source of truth. Keep accurate, minimal, actionable.
  rules:
    - "After meaningful changes, update progress.last_update and progress.last_agent."
    - "Never store secrets/tokens/private keys."
    - "Never store PII. Use placeholders."
    - "If blocked: set task status=blocked, add to progress.blocking_questions."
    - "When completed: add brief evidence to progress.evidence."

constraints:
  route_scope:
    - "Route in scope: POST /app/bookAppointment"
    - "Production-facing route: prefer small, reversible fixes only."
    - "No TDD; do not add tests unless explicitly requested."
  investigation_policy:
    - "User is not satisfied with APH-4419 findings — double down on root cause analysis before implementing."
    - "Re-examine Sentry traces at span level to confirm or challenge the two proposed fixes."
    - "Look beyond Google Calendar client and notifications — check DB queries, lock contention, AWS KMS calls, and other blocking spans."

decisions:
  parent_epic:
