    - "Current app latency leaders from Sentry include POST /app/bookAppointment, POST /app/packs/assessment/chat, GET /app/rhythm/flow/card, GET /app/rhythm/flow/insights, POST /app/forums/v2/grid, POST /app/profile/update, POST /app/circles/profile/update, and POST /app/v2/healthMetrics/update/steps."
