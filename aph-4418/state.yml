    choice: "User requested POST /admin/experts/sessions/grid be tracked under APH-4418 as a child ticket despite the original app-only phase boundary."
  next_step:
    choice: "Create child tickets route by route from the prioritized candidate list, keeping shared observations only in APH-4418."

execution:
  git_layout: "multi-repo (each folder is its own git repo; workspace root is not a git repo)"
  development_guidelines:
    testing_policy:
      tdd: false
      note: "Do NOT follow TDD. Add/modify tests only when explicitly requested."
    verification_policy:
      note: "Prefer manual verification with targeted lint/typecheck only when stable."
    worktree_policy:
      required: false
      note: "No git worktree required for epic-level route inventory and prioritization work."
  branch_plan:
    anyobackendapi:
      base: "origin/main"
      branch: "aph-4418"
      pr: "TBD after child tickets"

child_tickets:
  - jira: APH-4419
    title: "Investigate latency for POST /app/bookAppointment and prepare a production-safe fix plan"
    route: "POST /app/bookAppointment"
    bucket: "booking-session"
    status: active
    notes:
      - "First route selected for deep investigation under the route-per-child strategy."
  - jira: APH-4420
    title: "Fix POST /app/bookAppointment latency — cache Calendar client + move notifications async"
    route: "POST /app/bookAppointment"
    bucket: "booking-session"
    status: active
    notes:
      - "User requested deeper investigation before implementation after APH-4419."
  - jira: APH-4430
    title: "Diagnose and fix latency on POST /admin/experts/sessions/grid"
    route: "POST /admin/experts/sessions/grid"
    bucket: "scope-exception-admin-expert"
    status: active
    notes:
      - "User requested this admin/expert route be tracked under APH-4418 as a scope exception."

