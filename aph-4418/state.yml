    - "7d production Sentry view confirms app tail-latency leaders include /app/v2/healthMetrics/update/steps, /app/updateAppointment, /app/packs/assessment/chat, /app/rhythm-config/upsert, /app/circles/profile/update, /app/circles/generateProfileName, /app/bookAppointment, /app/therapist/meta/batch, /app/therapist/slots/:id, /app/v2/therapy/plans/checkout, /app/profile/update, /app/rhythm/flow/card, /app/rhythm/flow/insights, and /app/forums/v2/grid."
