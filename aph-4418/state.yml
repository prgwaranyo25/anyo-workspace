meta:
  jira: APH-4418
  title: "API latency reduction - app API inventory and prioritization"
  created: "2026-03-18"
  status: active
  owners:
    - pragadeesh
  repos_and_paths:
    anyobackendapi:
      - src/server.ts
      - src/core/routes/index.ts
      - src/anyo-circles/routes/appRoutes.ts
      - src/anyo-lyfis/routes/appRoutes.ts
      - src/anyo-rhythm/routes/appRoutes.ts

state_yml_hygiene:
  purpose: >
    Single source of truth for the epic. Keep accurate, minimal, and high level.
  rules:
    - "After meaningful changes, update progress.last_update and progress.last_agent."
    - "Never store secrets/tokens/private keys."
    - "Never store PII. Use placeholders."
    - "Keep detailed implementation tasks in child ticket state.yml files."
    - "Track shared blockers and cross-ticket decisions here."

constraints:
  scope:
    - "Phase 1 is app APIs only; expert and admin APIs are deferred."
    - "Use src/server.ts as the routing entry point to avoid context overload."
    - "Do not implement code changes in anyobackendapi during this epic setup phase."
    - "Use state.yml as the epic source of truth and keep detailed route inventory in ticket-local notes."
    - "Epic-level execution does not require a git worktree."
    - "No TDD for this epic; do not add tests unless explicitly requested."
    - "Each investigated app route will get its own child ticket; do not batch multiple production route fixes into one child ticket."
    - "Keep all cross-route observations, prioritization, and shared evidence in aph-4418/."
  analysis_policy:
    - "Route inventory must be confirmed from mounted routers, not inferred only from Sentry transaction names."
    - "Sentry is the primary latency evidence source; code inspection is used to group and prioritize later child tickets."
    - "Each route investigation must examine multiple traces, slow spans, and code-path dependencies before proposing fixes."
    - "Brainstorming is required for every route before implementation; do not jump from top-level metrics straight to a code change."

decisions:
  phase_order:
    choice: "App APIs first, then expert-facing APIs, then admin APIs."
  delivery_strategy:
    choice: "One route per child ticket for production safety."
    rationale:
      - "We need to understand what is wrong with each route before proposing a fix."
      - "We want small, reversible production-facing changes instead of broad multi-route changes."
      - "Shared patterns can be noted at the epic level, but implementation should move route by route."
  routing_entrypoint:
    choice: "Start from src/server.ts and follow only routers mounted for app traffic."
    mounted_app_routers:
      - "src/core/routes/index.ts via coreRouter"
      - "src/anyo-circles/routes/appRoutes.ts via appCirclesRouter"
      - "src/anyo-lyfis/routes/appRoutes.ts via appLyfisRouter"
      - "src/anyo-rhythm/routes/appRoutes.ts via appRhythmRouter"
  current_inventory:
    raw_route_registrations: 250
    unique_app_routes: 248
    notes_file: "aph-4418/notes/app-route-inventory.md"
    caveats:
      - "Counts include /app/u/* unauth app endpoints because they are part of app flows."
      - "Two duplicate registrations exist in LYFIS app routes (global-insights and get/shared/items)."
  app_priority_buckets:
    - key: booking-session
      rationale: "High user impact with materially slow p95/p99 tails in Sentry."
    - key: high-volume-read-list
      rationale: "Large traffic share and meaningful latency tails; likely best broad user-impact wins."
    - key: ai-chat
      rationale: "Sentry traces already show gen_ai.chat and http.client latency concentration."
    - key: profile-update-write-heavy
      rationale: "Several app writes show very high tails despite lower volume."
    - key: groups-events-fitness
      rationale: "Secondary domain bucket for slower but still meaningful app endpoints."
  sentry_time_windows:
    primary: "7d for stable route ranking, 24h for current hot regressions"
  route_ticket_strategy:
    child_ticket_unit: "one route per child ticket"
    instruction_file: "aph-4418/AGENTS.md"
    preferred_route_diagnosis_skill: "anyobackendapi-api-latency-diagnosis"
    preferred_route_workflow: ".opencode/skills/anyobackendapi-api-latency-diagnosis/SKILL.md"
    prioritization_order:
      - "User impact first"
      - "Then p95/p99 latency"
      - "Then request count / frequency"
      - "Then ease of observability from Sentry and code path clarity"
    first_route_candidates:
      - route: "POST /app/bookAppointment"
        bucket: "booking-session"
