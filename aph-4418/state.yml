    - "Confirmed cache keys are hash-tagged as {NAMESPACE}:key in anyobackendapi/src/common/anyoCache/anyoCacheService.ts, which pins each namespace to one Redis Cluster hash slot and explains namespace-isolated latency."
    - "Found instrumentation gap: anyobackendapi/src/instrument.js cachePrefixes omit newer namespaces present in anyoCacheService.ts (including RHYTHM_RING_COPY_CACHE, RHYTHM_INSIGHTS_CACHE, SSO_EXCHANGE_CACHE, and SAML_SESSION_CACHE), so Sentry namespace coverage is incomplete."
    - "Read-only GCP logs on anyo-infra / anyo-gke-autopilot-as1 show prod cache is in-cluster Valkey (`anyo-valkey-cache`), not managed Memorystore; sampled Valkey logs show normal operation and clean RDB saves rather than sustained saturation symptoms."
    - "Correlated transient cache connection failures to a Valkey pod replacement window on 2026-03-17 around 15:10Z: old pod received SIGTERM and exited cleanly, new pod became ready around 18s later, and anyo-api / anyo-pubsub logged `SocketClosedUnexpectedlyError` from `@redis/client` during the cutover."
    - "Recorded APH-4420 in the epic child-ticket list to keep epic state in sync with existing route work."
