      - "After preview deploy, whitelist PWA preview host in Firebase authorized domains when real SAML redirect is enabled"

data_model_targets:
  partner:
    new_fields:
      - "clientCode: string (admin editable, required)"
      - "sso.domains: map keyed by domain"
    sso_domain_entry_fields:
      - "domain: string"
      - "enabled: boolean"
      - "saml.sp.type: firebase | anyobackend"
      - "saml.sp.providerId: string  # saml.<clientCode>--<domainSlug>"
      - "saml.sp.gipInboundSamlConfigName?: string  # projects/*/inboundSamlConfigs/*"
      - "saml.sp.signRequest?: boolean"
      - "saml.idp.type: IdpType enum (AZURE | GSUITE)"
      - "saml.idp.entityId: string"
      - "saml.idp.ssoUrl: string"
      - "saml.idp.certRef?: string  # fingerprint/ref only; NOT raw cert for firebase flow"
      - "saml.idp.x509Certificate?: string  # stored only for anyobackend flow"
    enums:
      - "AuthMode: OTP | SAML"
      - "IdpType: AZURE | GSUITE"
      - "SamlSpType: firebase | anyobackend"

backend_api_contracts:
  admin:
    - name: UpsertPartnerClientCode
      method: POST
      path: "/admin/partners/:partnerId/client-code"
      auth: "admin + permission"
      input: "{ clientCode }"
      output: "{ partnerId, clientCode }"
    - name: EnableOrUpdateSamlForDomain
      method: POST
      path: "/admin/partners/:partnerId/sso/saml/domain"
      auth: "admin + permission"
      input: >
        {
          domain,
          enabled,
          spType: "firebase"|"anyobackend",
          idpType: "azure"|"gsuite",
          idp: { entityId, ssoUrl, x509Certificate },
          signRequest?: boolean
        }
      output: >
        {
          partnerId,
          domain,
          enabled,
          providerId,
          inboundSamlConfigName,
          spType,
          displayName
        }
  app_un_auth:
    - name: LookupAuthModeByEmail
      method: GET
      path: "/app/u/auth-mode"
      auth: none
      input: "email query param"
      output: >
        {
          mode: "otp"|"saml",
          domain,
          providerId?,
          spType?: "firebase"|"anyobackend"
        }
  mobile_bridge:
    - name: SsoExchange
      method: POST
      path: "/auth/sso/exchange"
      auth: none
      input: "{ firebaseIdToken, providerId, state }"
      output: "{ code, state }"
      notes: >
        Verifies Firebase ID token, generates short-lived one-time code (TTL 120s)
        stored in SSO_EXCHANGE_CACHE. Code is single-use.
    - name: SsoRedeem
      method: POST
      path: "/auth/sso/redeem"
      auth: none
      input: "{ code, state }"
      output: "{ token }"
      notes: >
        Validates code + state, deletes code immediately (single-use),
        issues Firebase custom token for the authenticated uid.

gcp_identity_platform:
  api:
    base: "https://identitytoolkit.googleapis.com"
    resource: "admin/v2/projects/*/inboundSamlConfigs"
    method_create: "POST /admin/v2/{parent=projects/*}/inboundSamlConfigs?inboundSamlConfigId=<id>"
    permissions_needed:
      - "firebaseauth.configs.update"
  inbound_saml_config_shape:
    fields:
      - enabled
      - displayName
      - idpConfig.idpEntityId
      - idpConfig.ssoUrl
      - idpConfig.idpCertificates[].x509Certificate
      - idpConfig.signRequest
      - "spConfig.spEntityId = https://anyo-2022.firebaseapp.com"
      - "spConfig.callbackUri = https://anyo-2022.firebaseapp.com/__/auth/handler"

