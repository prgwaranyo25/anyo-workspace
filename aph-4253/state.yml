meta:
  jira: APH-4253
  title: "SAML SSO via Firebase + Anyo Backend (PWA + Customer App + Auth + Admin + Backend)"
  created: "2026-02-20"
  status: active
  owners:
    - pragadeesh
  repos_and_paths:
    anyo_web_app: "anyo-web-app/"
    anyo_pwa_ui: "anyopwaui/"
    anyo_portal_admin: "anyo-portal/projects/admin/"
    anyo_backend_api: "anyobackendapi/"
    anyo_auth: "anyoauth/"
    anyo_customer_app: "anyocustomerapp/"

state_yml_hygiene:
  purpose: >
    Ralph runs as a stateless autonomous agent; each iteration has fresh context.
    This file is the only memory source. Keep it accurate, minimal, and actionable.
  rules:
    - "Single source of truth: do not duplicate decisions elsewhere; reference this file."
    - "After meaningful changes, update progress.last_update, progress.last_agent, and touched tasks."
    - "Never store secrets/tokens/private keys/cert contents/Firebase ID tokens/refresh tokens."
    - "Never store PII (emails/phones). Use placeholders."
    - "If blocked: set task status=blocked and add one entry to progress.blocking_questions."
    - "When completed: add brief evidence to progress.evidence (commands run + results)."
    - "Keep allowlists + URLs consistent with decisions section."

constraints:
  auth_flow:
    - "No embedded WebView"
    - "System browser only"
    - "No long-lived tokens in URLs"
    - "Auth broker remains auth.anyo.app for both Firebase and Anyobackend SP flows"
    - "Anyobackend SP flow must round-trip back to auth.anyo.app before final app deep-link/web callback"
    - "IdP-initiated SSO is web/PWA-first; mobile deep-link requires app-initiated flow via auth broker session"
  non_goals:
    - "No Azure/GCP console manual changes in PRs"
    - "No onboarding UI for new SAML providers beyond partner maintenance"
  service_provider_constants:
    sp_entity_id: "https://anyo-2022.firebaseapp.com"
    acs_url: "https://anyo-2022.firebaseapp.com/__/auth/handler"
  production_urls:
    pwa_origin: "https://anyo.app"
    pwa_base_path: "/app"
    pwa_auth_path: "/app/auth"

decisions:
  idp_first: azure
  popup_only: false
  future_multi_client: true
  partner_identifier: "clientCode (admin-managed, required)"
  saml_config_scope: per-domain
  provider_per_domain: true
  provider_id_format: "saml.<clientCode>--<domainSlug>"
  dual_sp_support: true
  login_behavior:
    if_domain_saml_enabled: "force_sso_no_otp_fallback"
  redirect_loop:
    description: "Popup-only SAML login from existing auth screen"
    steps:
      - "PWA login calls /app/u/auth-mode with email"
      - "If mode=saml, PWA calls Firebase signInWithPopup with providerId"
      - "Firebase user is available immediately after popup login"
      - "Existing auth provider syncs cookie and handles authenticated navigation"
  idp_initiated_saml:
    approach: custom_saml_anyobackend
    library: "@node-saml/node-saml"
    per_partner: true
    field: "IPartnerSsoDomain.saml.sp.type: firebase | anyobackend"
    routing: "always via auth.anyo.app start.js; start.js routes to Firebase or backend based on spType"
  auth_broker_flow:
    source_of_truth: "/app/u/auth-mode returns providerId + spType"
    pwa_and_mobile_entry: "always open https://auth.anyo.app/sso/saml/start"
    anyobackend_sp_roundtrip: "auth.anyo.app -> backend /auth/saml/login -> backend ACS -> auth.anyo.app -> final linkinguri"
    mobile_reason: "backend direct redirect to anyoapp:// is avoided; final deep-link is owned by auth.anyo.app"
    idp_initiated_return_via_auth:
      enabled: true
      backend_fallback_uri: "https://auth.anyo.app/sso/saml/start"
      final_destination_default: "https://anyo.app/app"
      note: "IdP-initiated has no stored linkinguri/session for mobile; treat as web/PWA entry unless RelayState carries linkinguri"
  anyobackend_sp_constants:
    sp_entity_id: "https://anyo.app/saml/sp"
    acs_url: "https://apiv3.anyo.app/auth/saml/acs"
    login_url: "https://apiv3.anyo.app/auth/saml/login"

execution:
  git_layout: "multi-repo (each folder is its own git repo; workspace root is not a git repo)"
  development_guidelines:
    testing_policy:
      tdd: false
      note: "Do NOT follow TDD in these repos. Add or modify tests only when explicitly requested."
    verification_policy:
      note: "Prefer manual verification with mock-first loop and targeted lint/typecheck only when stable in the repo."
  base_branch_policy:
    default_base: "origin/main"
    note: "Branch from origin/main for APH-4253 work except anyocustomerapp which must branch from APH-3248-expo-upgrades."

  current_checked_out_branches_snapshot:
    captured: "2026-02-20"
    anyobackendapi: "aph-4024-gcp-migration"
    anyopwaui: "aph-3539"
    anyo-portal: "aph-4110"
    anyo-web-app: "main"
    warnings:
      - "anyopwaui has untracked temp.md; do not commit it"

  branch_plan:
    anyobackendapi:
      base: "origin/main"
      branch: "aph-4253"
      pr: "PR-Backend"
    anyo-portal:
      base: "origin/main"
      branch: "aph-4253"
      pr: "PR-Portal"
    anyo-web-app:
      base: "origin/main"
      branch: "aph-4253"
      pr: "PR-Bridge"
    anyopwaui:
      base: "origin/main"
      branch: "aph-4253"
      pr: "PR-PWA"
    anyoauth:
      base: "origin/main"
      branch: "aph-4253"
      pr: "PR-Auth"
    anyocustomerapp:
      base: "APH-3248-expo-upgrades"
      branch: "aph-4253"
      pr: "PR-CustomerApp"

  repo_sync_steps:
    - "git fetch origin"
    - "git checkout main"
    - "git pull --ff-only"
    - "git checkout -b <branch_plan.*.branch>"

  parallel_tracks:
    - id: TRACK_BACKEND
      repos: ["anyobackendapi/"]
      tasks: ["B1", "B2", "B3", "B4", "B5"]
      can_run_in_parallel_with: ["TRACK_PWA_SSO", "TRACK_PORTAL_SCAFFOLD"]
      blocking_outputs_for_others:
        - "B4 must exist before P1 can wire real auth-mode call"
        - "B3 must exist before A1 can wire real save calls"
    - id: TRACK_PWA_SSO
      repos: ["anyopwaui/"]
      tasks: ["W1", "W2", "P1", "P2"]
      dependencies:
        - "P1 depends_on B4 (auth-mode lookup) for real wiring"
      allowed_early_work:
        - "Popup SAML auth flow can be integrated directly into auth screen"
    - id: TRACK_PORTAL_SCAFFOLD
      repos: ["anyo-portal/projects/admin/"]
      tasks: ["A1"]
      dependencies:
        - "A1 depends_on B3 for real wiring"
      allowed_early_work:
        - "Form/UI model can be built before backend endpoint exists"

  state_yml_write_lock:
    rule: "Only one agent/session edits aph-4253/state.yml at a time."
    coordination:
      - "Parallel agents write findings to aph-4253/notes/<agent>-update.md; a single state maintainer merges into state.yml."
      - "Every merge into state.yml must keep YAML valid and update progress.last_update + progress.last_agent."

