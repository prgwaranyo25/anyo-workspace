feature: IDP-Initiated Custom SAML Login
ticket: APH-4253
created: "2026-03-01"
status: implemented

problem: >
  Firebase Auth SAML only supports SP-initiated flows. Gmail workspace app tiles
  trigger true IDP-initiated SAML (Azure posts assertion directly to ACS URL).
  Firebase throws "missing initial state" and cannot handle this flow.

solution: >
  Custom SAML handler in anyobackendapi using @node-saml/node-saml with its own
  ACS URL. Per-partner samlProvider field decides Firebase vs custom backend SAML.
  Auth routing always via auth.anyo.app which routes based on samlProvider param.

sp_constants:
  entity_id: "https://anyo.app/saml/sp"
  acs_url: "https://apiv3.anyo.app/auth/saml/acs"
  login_url: "https://apiv3.anyo.app/auth/saml/login"

flows:
  idp_initiated:
    trigger: "User clicks Gmail workspace app tile"
    path:
      - "Azure POSTs SAMLResponse to https://apiv3.anyo.app/auth/saml/acs"
      - "Backend finds partner domain by Issuer (azure.idpEntityId match)"
      - "Backend validates assertion, looks up Anyo user by email"
      - "Backend creates short-lived code, redirects to https://anyo.app/app?code=xxx&state=idp_initiated"
      - "PWA detects ?code= on mount, redeems -> Firebase custom token -> signInWithCustomToken"

  sp_initiated_anyobackend:
    trigger: "User enters email, backend returns samlProvider=anyobackend"
    path:
      - "PWA opens popup to auth.anyo.app/sso/saml/start?providerId=xxx&samlProvider=anyobackend"
      - "start.js redirects to https://apiv3.anyo.app/auth/saml/login?providerId=xxx&state=xxx&linkinguri=xxx"
      - "Backend generates SAMLRequest, saves session, 302 to Azure"
      - "Azure authenticates, POSTs to ACS with RelayState={requestId}"
      - "Backend validates, creates code, redirects to linkinguri?code=xxx"
      - "Popup postMessages back to PWA, PWA redeems code -> signInWithCustomToken"

  sp_initiated_firebase:
    trigger: "User enters email, backend returns samlProvider=firebase (default)"
    path:
      - "Existing popup flow unchanged"
      - "auth.anyo.app/sso/saml/start does Firebase signInWithRedirect/popup"

azure_config_per_partner_anyobackend:
  reply_url_acs: "https://apiv3.anyo.app/auth/saml/acs"
  identifier_entity_id: "https://anyo.app/saml/sp"
  sign_on_url: "https://apiv3.anyo.app/auth/saml/login?providerId=saml.<clientCode>--<domainSlug>"
  relay_state_idp_initiated: '{"linkinguri":"https://anyo.app","state":"idp_initiated"}'

